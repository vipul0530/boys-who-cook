[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all requests to static files (Next.js static export)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/:splat/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Identity widget redirect
[[redirects]]
  from = "/api/identity/*"
  to = "/.netlify/identity/:splat"
  status = 200
  force = true

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
