[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Note: Do NOT add @netlify/plugin-nextjs here — that plugin is for SSR
# Next.js only and breaks static exports.

# Serve the admin SPA correctly
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Fallback: unknown paths → Next.js 404 page
[[redirects]]
  from = "/*"
  to = "/404/index.html"
  status = 404

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
